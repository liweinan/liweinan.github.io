<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    {% seo %}
    {% feed_meta %}
    <link rel="stylesheet" href="{{ site.url }}/css/default.css" type="text/css"/>
    <link rel="stylesheet" href="{{ site.url }}/css/small.css" type="text/css" media="(max-width: 720px)"/>
    <link rel="stylesheet" href="{{ site.url }}/css/syntax.css" type="text/css"/>
    <link rel="icon" href="{{ site.url }}/images/site-logo.png" type="image/png"/>
    {% assign ga4_id = site.ga4_measurement_id | default: "" | strip %}
    {% if ga4_id != "" %}
    <!-- Google tag (gtag.js) - GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ ga4_id }}"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ ga4_id }}');
    </script>
    {% endif %}
</head>
